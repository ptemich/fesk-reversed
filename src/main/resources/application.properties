spring.application.name=ksef
spring.jpa.open-in-view=false

sdk.config.base-uri=https://api.ksef.mf.gov.pl
sdk.config.suffix-uri=v2
sdk.config.qr-uri=https://qr.ksef.mf.gov.pl
sdk.config.request-timeout=100
sdk.config.lighthouse-base-uri=https://api-latarnia.ksef.mf.gov.pl/

# nie zapomnij zmienic na produkcje
gg.jte.developmentMode=false
gg.jte.usePrecompiledTemplates=true


localConfigFileName=settings.json


spring.datasource.url=jdbc:h2:file:./data/file-database
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2